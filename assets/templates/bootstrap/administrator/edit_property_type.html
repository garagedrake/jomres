<patTemplate:tmpl name="pageoutput" unusedvars="strip">
<h2 class="page-header">{PAGETITLE}</h2>

<form action="{CASTOR_SITEPAGE_URL_ADMIN}" method="post" name="adminForm" class="form-horizontal">
	{CASTORTOOLBAR}
	<fieldset>
		<div class="control-group">
			<label class="control-label" for="ptype">{HPTYPE}</label>

			<div class="controls">
				<input type="text" class="input-large" name="ptype" value="{PTYPE}"/>
			</div>
		</div>

		<div class="control-group">
			<label class="control-label" for="ptype_desc">{HPTYPE_DESC}</label>

			<div class="controls">
				<input type="text" class="input-large" name="ptype_desc" value="{PTYPE_DESC}"/>

				<p class="help-block">
					{FURTHER}
				</p>
			</div>
		</div>

		<div class="control-group">
			<label class="control-label" for="mrp_srp_flag">{_CASTOR_PROPERTYTYPE_FLAG}</label>

			<div class="controls">
				{_CASTOR_PROPERTYTYPE_FLAG_DROPDOWN}

				<p class="help-block">
					{_CASTOR_PROPERTYTYPE_FLAG_DESC}
				</p>
			</div>
		</div>
		
		<div class="control-group">
			<label class="control-label" for="has_stars">{HAS_STARS_TITLE}</label>

			<div class="controls">
				{HAS_STARS}
			</div>
		</div>
	
		<div class="control-group">
			<label class="control-label" for="property_type_marker">{_CASTOR_PROPERTYTYPE_MARKER}</label>

			<div class="controls">
				<div class="radio-inline">
					<label>
						<patTemplate:tmpl name="markers" unusedvars="strip">
						<input type="radio" name="marker" value="{IMAGE_FILENAME}" {ISCHECKED} ><img src="{IMAGE_SRC}" />
						</patTemplate:tmpl>
					</label>
				</div>
			</div>
		</div>
	
	
	
		<input type="hidden" name="id" value="{ID}"/>
		<input type="hidden" name="option" value="com_castor"/>
		<input type="hidden" name="task" value="save_property_type"/>
		{CSRF_TOKEN}
	</fieldset>
</form>
</patTemplate:tmpl>
