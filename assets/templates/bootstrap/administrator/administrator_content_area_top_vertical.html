<patTemplate:tmpl name="pageoutput" unusedvars="strip">

<style type="text/css">
@media (min-width: 768px) {
	#castor_bootstrap_wrapper .modal.fade.in {top:5%;}
	#castor_bootstrap_wrapper .modal {left:15%;margin-left:0;width:70%}
	#castor_bootstrap_wrapper .modal .modal-body {max-height:700px;}
	}
#castor_bootstrap_wrapper .modal .modal-body {position: relative; overflow-y: auto;}
</style>

<div id="castor_bootstrap_wrapper">
	{SUBSCRIPTION_WARNING}
	{OBSOLETE_FILES_WARNINGS}
	
	<script type="text/javascript">
		<!--
		var castor_using_bootstrap = '{USING_BOOTSTRAP}';
		castorJquery(document).ready(function () {
			var $content = castorJquery('#castor-toolbar').html();
			castorJquery('#castor_admin_toolbar').html($content);
			castorJquery('#castor-toolbar').empty();
			
			if (castorJquery('#castor_admin_toolbar').html().trim() != '') {
				castorJquery('#castor_admin_toolbar').css("display", "block");
			}	
		});
		//-->
	</script>

	<div class="row-fluid">
		<div class="span6">
			<a href="http://www.castor.net" target="_blank"><img src="{CASTOR_IMAGES_RELPATH}jrlogo.png" border="0" alt="Castor logo" width="150"/></a>
		</div>
		<div class="span6">
			<div class="pull-right">{LANGDROPDOWN}</div>
			<div class="pull-right">&nbsp;&nbsp;&nbsp;</div>
			<div class="pull-right">
				{VIDEO_TUTORIALS}
			</div>
			<div class="pull-right">&nbsp;&nbsp;&nbsp;</div>
			<div class="pull-right">
				<a href="{CASTOR_SITEPAGE_URL_NOSEF}&task=listyourproperties&from_admin=1" class="btn btn-success hidden-phone hidden-tablet" target="_blank"><i class="fa fa-building"></i> {HMANAGE_PROPERTIES}</a>
			</div>
		</div>
		<div class="clearfix"></div>
	</div>
	{LICENSE_WARNING}
	{BOOTSTRAP_WARNING}
	{REVIEW_REQUEST}
	{FEEDBACK_REQUEST}
	<div class="row-fluid">
		<div class="span2">
			{CONTROL_PANEL_MENU}
		</div>
		<div class="span10">
			<div id="castor_feedback" class="clearfix"></div>
			<div id="castor_admin_toolbar" class="well well-small"></div>
</patTemplate:tmpl>
