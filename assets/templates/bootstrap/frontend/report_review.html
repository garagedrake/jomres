<h2 class="page-header">{_CASTOR_REVIEWS_REPORT_REVIEW}</h2>

<form action="{CASTOR_SITEPAGE_URL_NOSEF}" method="post" id="reviewForm" name="adminform" class="form-horizontal">
	<fieldset>
		<div class="control-group">
			<label class="control-label" for="report">{CASTOR_COM_A_MESSAGE}</label>

			<div class="controls">
				<textarea name="report" class="input-xlarge" rows="5" class="required"></textarea>
			</div>
		</div>
		<div class="form-actions">
			<a href="{PROPERTY_DETAILS_URL}" class="btn"><i class="icon-remove"></i> {COMMON_CANCEL}</a>
			<button class="btn btn-primary" type="submit">{_CASTOR_REVIEWS_SUBMIT}</button>
		</div>
	</fieldset>
	<input type="hidden" name="rating_id" value="{RATING_ID}"/>
	<input type="hidden" name="no_html" value="1"/>
	<input type="hidden" name="task" value="save_review_report"/>
	{CSRF_TOKEN}
</form>
