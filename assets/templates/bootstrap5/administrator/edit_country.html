
<patTemplate:tmpl name="pageoutput" unusedvars="strip">
	<h2 class="page-header">{_CASTOR_EDIT_COUNTRY_TITLE}</h2>

	<form action="{CASTOR_SITEPAGE_URL_ADMIN}" method="post" name="adminForm" class="form-horizontal">
		{CASTORTOOLBAR}
		<fieldset>
			<div class="control-group">
				<label class="control-label" for="country_code">{_CASTOR_EDIT_COUNTRY_COUNTRYCODE}</label>

				<div class="controls">
					<input class="input-large" type="text" name="country_code" value="{COUNTRYCODE}"/>
				</div>
			</div>

			<div class="control-group">
				<label class="control-label" for="country_name">{_CASTOR_EDIT_COUNTRY_COUNTRYNAME}</label>

				<div class="controls">
					<input class="input-large" type="text" name="country_name" value="{COUNTRYNAME}"/>
				</div>
			</div>

			<input type="hidden" name="id" value="{ID}"/>
			<input type="hidden" name="option" value="com_castor"/>
			<input type="hidden" name="task" value="save_country"/>
			<input type="hidden" name="no_html" value="1"/>
			{CSRF_TOKEN}
		</fieldset>
	</form>
</patTemplate:tmpl>
