<patTemplate:tmpl name="pageoutput">
<script type="text/javascript">
// Moves the menu to the content/component area (above the Castor output), however that will be overriden by navbar-fixed-bottom or navbar-fixed-top
document.addEventListener('DOMContentLoaded', function(){
	var $content = castorJquery('#castor-menu-pinned').html();
	castorJquery('#{MENU_LOCATION}').html($content);
	castorJquery('#castor-menu-pinned').empty(); // making sure that the old div doesn't have the accordion applied to it.
}, false);

</script>

<div id="castor-menu-pinned" style="display:none;">
	<nav class="navbar navbar-expand-sm navbar-light {NAVBAR_LOCATION} {NAVBAR_INVERSE} rounded" role="navigation">
		<div class="container-fluid">
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCastorMainMenu" aria-controls="navbarCastorMainMenu" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarCastorMainMenu">
				<ul class="navbar-nav me-auto mb-2 mb-lg-0 bg-transparent ">
					<patTemplate:tmpl name="menu_sections">
						{SECTION}
					</patTemplate:tmpl>
				</ul>
			</div>
		</div>
	</nav>
{USER_FEEDBACK}
</div>

</patTemplate:tmpl>
