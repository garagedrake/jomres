<patTemplate:tmpl name="pageoutput" unusedvars="strip">
<script type="text/javascript">
    document.addEventListener('DOMContentLoaded', function(){
	var feedback_content = castorJquery('#jr_feedback_msgs').html();
	castorJquery('#castor_feedback').html(feedback_content);
	castorJquery('#jr_feedback_msgs').empty();
	
	if (castorJquery('#castor_feedback').html().trim() != '') {
		castorJquery('#castor_feedback').css("display", "block");
	}
    }, false);
</script>

<div id="jr_feedback_msgs" style="display:none;">{MESSAGES}</div>
</patTemplate:tmpl>
